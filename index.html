<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Countdown</title>
  <style>
    @font-face {
      font-family: "Digital-7";
      src: url("digital-7.ttf") format("truetype"); /* Corrected path to root */
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --lcd-orange: #ef9409;
      --lcd-red: #b50000;
      --hud-top: 61%; 
      --hud-left: 51.5%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Start Overlay with 4 Options */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: var(--lcd-orange);
      font-family: "Digital-7", sans-serif;
      transition: opacity 0.5s ease;
    }

    .overlay-title {
      font-size: 3rem;
      margin-bottom: 2rem;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .start-options {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .time-btn {
      background: transparent;
      border: 2px solid var(--lcd-orange);
  0       color: var(--lcd-orange);
      font-family: "Digital-7", sans-serif;
      font-size: 2.5rem;
      padding: 10px 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .time-btn:hover {
      background: var(--lcd-orange);
      color: #000;
      box-shadow: 0 0 20px var(--lcd-orange);
    }

    .viewport-lock {
      position: relative;
      aspect-ratio: 1920 / 1080; 
      width: 100vw;
      height: auto;
      container-type: size;
    }

    @media (min-aspect-ratio: 1920/1080) {
      .viewport-lock {
        width: auto;
        height: 100vh;
      }
    }

    .bg-image {
      width: 100%; height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      top: var(--hud-top);
      left: var(--hud-left);
      width: 100%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .unit .num {
      font-family: "Digital-7", monospace;
      font-size: 18.2cqw; 
      line-height: 1;
      color: var(--lcd-orange);
      font-variant-numeric: tabular-nums;
      display: flex;
       justify-content: center;
      align-items: center;
      width: 100%;
    }

    .slot {
      display: inline-block;
      width: 0.45em; 
      text-align: center;
    }

    .slot.sep { 
      width: 0.12em;
      margin-left: -0.02em;
    }
    
    .slot.last-colon { 
      font-size: 0.8em; 
  0     width: 0.15em; 
      transform: translateY(0.09em);
    }

    .slot.ms { 
      font-size: 0.8em; 
      width: 0.45em; 
      transform: translateY(0.09em);
    }
    
    .danger-overlay {
      position: fixed;
      inset: 0;
  0     display: none;
      pointer-events: none;
      opacity: 0;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <div class="overlay-title">Select Duration</div>
    <div class="start-options">
      <button class="time-btn" data-mins="20">20 MIN</button>
      <button class="time-btn"
